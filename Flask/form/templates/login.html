<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NLP APP | Login Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .form-wrap { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h2 { text-align: center; font-size: 20px; margin-bottom: 1.5rem; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: #5b6bff; }
    button { width: 100%; padding: 11px; background: #5b6bff; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4a58e0; }
    .register-link { text-align: center; margin-top: 1rem; font-size: 13px; color: #555; }
    .register-link a { color: #5b6bff; text-decoration: none; font-weight: 600; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="form-wrap">
    <h2>Login</h2>

    {% if message == 'Registration successfull. Kindly login to proceed' %}
        <p style="background: #dcfce7; color: #16a34a; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 1rem;">
            {{message}}
        </p>
    {% endif %}

    {% if message=='Invalid email or password' %}
        <p style="background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 1rem;">
            {{message}}
        </p>
    {% endif %}

    <form action='/perform_login' method="post">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <button type="submit">Login</button>
    </form>

    <p class="register-link">
      Not a member? <a href="/register">Register here</a>
    </p>
  </div>
</body>
</html>
